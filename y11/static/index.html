              {!fb.counts_as_correct&&!retype&&fb.correct_answer&&<div className="anim-fade" style={{marginTop:16,padding:'16px 20px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:12,maxWidth:900,width:'100%',textAlign:'left'}}><p style={{fontWeight:700,fontSize:'0.85rem',color:'#16a34a',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Correct answer</p><p style={{fontSize:'1.3rem',fontWeight:800,color:'var(--dark)'}}>{fb.correct_answer}</p></div>}
              {retype&&<div className="anim-fade" style={{marginTop:16,width:'100%',maxWidth:900,padding:'24px',background:'var(--white)',border:'2px solid var(--lgrey)',borderRadius:20}}>
                {fb?.message&&<div style={{background:'var(--coral)',color:'white',padding:'10px 18px',borderRadius:10,fontWeight:700,marginBottom:20,display:'inline-block',fontSize:'1rem'}}>{renderText(fb.message)}</div>}
                <div style={{marginBottom:24,padding:'20px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:16,textAlign:'left'}}><p style={{fontWeight:800,fontSize:'0.9rem',color:'#16a34a',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>The correct answer is</p><p style={{fontSize:'1.5rem',fontWeight:800,color:'var(--dark)'}}>{fb.correct_answer}</p></div>
                {q?.explanation&&<div style={{marginBottom:20,padding:'16px 20px',background:'#F5F3FF',border:'2px solid #7C3AED',borderRadius:12,textAlign:'left',lineHeight:1.8}}><p style={{fontWeight:800,fontSize:'0.82rem',color:'#7C3AED',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10}}>Explanation</p>{renderExplanation(q.explanation)}</div>}
                <p style={{fontSize:'1.2rem',marginBottom:12,fontWeight:800,color:'var(--navy)'}}>Type the correct answer to continue:</p>
                <input ref={rtRef} className="typed-input" style={{maxWidth:'900px',borderColor:rtFb?'var(--red-bright)':''}} value={rtAns} onChange={e=>{setRtAns(e.target.value);setRtFb(null)}} placeholder="..."/>
                {rtFb&&<div style={{color:'var(--red-bright)',marginTop:12,fontWeight:700}}>{renderText(rtFb)}</div>}
                <button className="btn btn-outline" disabled={busy} onClick={rtSubmit} style={{marginTop:20}}>Check<span className="keyhint">Enter</span></button>
              </div>}
            </>
          }
          </div>
        </div></div>
      </div>
    );
  }

  // ── TF Typed (typed phase after TranslateForm MCQ) ───────────────────────────
  // Shows the Latin form, asks for English translation (typed)
  function TFTyped({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const [queue,setQueue]=useState(()=>[...qs]);
    const [qIdx,setQIdx]=useState(0);
    const [ans,setAns]=useState('');const [fb,setFb]=useState(null);
    const [retype,setRetype]=useState(false);const [rtAns,setRtAns]=useState('');const [rtFb,setRtFb]=useState(null);
    const [busy,setBusy]=useState(false);const inRef=useRef();const rtRef=useRef();
    const q=queue[qIdx];
    useEffect(()=>{if(!fb)inRef.current?.focus();if(retype)rtRef.current?.focus()},[qIdx,fb,retype]);
    const submit=async()=>{
      if(busy||!q)return;setBusy(true);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'vocab',question_text:q.form,pupil_answer:ans,correct_answer:q.correct});
      setFb(res);
      if(res.counts_as_correct){if(!q.failed)addC();}
      else{if(!q.failed)addW({latin:q.form,correct:q.correct});setQueue(prev=>[...prev,{...q,failed:true}]);setRetype(true);}
      setBusy(false);
    };
    const rtSubmit=async()=>{
      if(busy)return;setBusy(true);
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'vocab',question_text:q.form,pupil_answer:rtAns,correct_answer:q.correct});
      if(res.counts_as_correct){nx();}else setRtFb('Not quite. Try again.');
      setBusy(false);
    };
    const nx=()=>{setAns('');setFb(null);setRetype(false);setRtAns('');setRtFb(null);if(qIdx+1>=queue.length)onDone();else setQIdx(i=>i+1)};
    useEffect(()=>{const h=e=>{if(e.key==='Enter'){if(retype)rtSubmit();else if(fb&&!retype)nx();else if(!fb)submit()}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)});
    if(!q)return null;
    const isRetry=q.failed;
    return(
      <div className="fullscreen"><div className="topbar"><h1>TRINITY ACADEMY LATIN</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}></div></div></div>
        <div className="activity-body">
          <div style={{minHeight:40,display:'flex',justifyContent:'center',alignItems:'center',marginBottom:8}}>
            {isRetry&&<div className="anim-fade" style={{background:'var(--gold)',border:'2px solid #c28500',borderRadius:10,padding:'6px 16px',fontWeight:800,color:'var(--dark)',fontSize:'0.9rem',display:'inline-block'}}>Try this again! You got it wrong before.</div>}
          </div>
          <h1 className="latin dynamic-latin" style={{fontSize:'4rem'}}>{q.form}</h1>
          <p style={{color:'var(--grey)',marginBottom:40,fontWeight:700,fontSize:'1.3rem',marginTop:8}}>Type the English translation</p>
          <div style={{minHeight:250,display:'flex',flexDirection:'column',alignItems:'center',width:'100%'}}>
            {!fb?<>
              <input ref={inRef} className="typed-input" disabled={busy} value={ans} onChange={e=>setAns(e.target.value)} placeholder="..."/>
              <button className="btn btn-primary" disabled={busy} onClick={submit} style={{marginTop:30}}>Check<span className="keyhint" style={{color:'white'}}>Enter</span></button>
            </>:<>
              <input className={`typed-input ${fb.counts_as_correct?'ok':'bad'}`} value={ans} disabled/>
              {!retype&&<div className={`feedback anim-fade ${fb.counts_as_correct?(fb.is_typo?'warn':'ok'):'bad'}`}>{renderText(fb.message)}</div>}
              {fb.counts_as_correct&&!retype&&fb.correct_answer&&ans.trim().toLowerCase().replace(/[^a-z0-9 /]/g,'').replace(/\s+/g,' ').trim()!==fb.correct_answer.trim().toLowerCase().replace(/[^a-z0-9 /]/g,'').replace(/\s+/g,' ').trim()&&<div className="anim-fade" style={{marginTop:16,padding:'12px 16px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:12,textAlign:'left',maxWidth:700,width:'100%'}}><p style={{fontWeight:700,fontSize:'0.8rem',color:'#16a34a',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Ideal answer</p><p style={{fontSize:'1.2rem',fontWeight:800,color:'var(--dark)'}}>{fb.correct_answer}</p></div>}
              {retype&&<div className="anim-fade" style={{marginTop:16,width:'100%',maxWidth:800,padding:'24px',background:'var(--white)',border:'2px solid var(--lgrey)',borderRadius:20}}>
                {fb?.message&&<div style={{background:'var(--coral)',color:'white',padding:'10px 18px',borderRadius:10,fontWeight:700,marginBottom:20,display:'inline-block',fontSize:'1rem'}}>{renderText(fb.message)}</div>}
                <div style={{marginBottom:24,padding:'20px',background:'#f0fdf4',border:'2px solid #16a34a',borderRadius:16,textAlign:'left'}}><p style={{fontWeight:800,fontSize:'0.9rem',color:'#16a34a',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>The correct answer is</p><p style={{fontSize:'1.8rem',fontWeight:800,color:'var(--dark)'}}>{q.correct}</p></div>
                <p style={{fontSize:'1.2rem',marginBottom:12,fontWeight:800,color:'var(--navy)'}}>Type the correct answer to continue:</p>
                <input ref={rtRef} className="typed-input" style={{borderColor:rtFb?'var(--red-bright)':''}} value={rtAns} onChange={e=>{setRtAns(e.target.value);setRtFb(null)}} placeholder="..."/>
                {rtFb&&<div style={{color:'var(--red-bright)',marginTop:12,fontWeight:700}}>{rtFb}</div>}
                <button className="btn btn-outline" disabled={busy} onClick={rtSubmit} style={{marginTop:20}}>Continue<span className="keyhint">Enter</span></button>
              </div>}
              {!retype&&<button className="btn btn-primary anim-fade" disabled={busy} onClick={nx} style={{marginTop:30}}>Next<span className="keyhint" style={{color:'white'}}>Enter</span></button>}
            </>}
          </div>
        </div></div>
      </div>
    );
  }

  // ── Parse and Translate (review set) ─────────────────────────────────────────
  function ParseAndTranslate({pupil,set,qs,isPreview,onDone,addC,addW,pct}){
    const TENSES=['present','imperfect','future','perfect','pluperfect'];
    const PERSON_NUMBERS=[
      {id:'1-s',label:'I',p:'1st',n:'singular'},{id:'2-s',label:'you (sg)',p:'2nd',n:'singular'},{id:'3-s',label:'he/she/it',p:'3rd',n:'singular'},
      {id:'1-p',label:'we',p:'1st',n:'plural'},{id:'2-p',label:'you (pl)',p:'2nd',n:'plural'},{id:'3-p',label:'they',p:'3rd',n:'plural'}
    ];
    const [idx,setIdx]=useState(0);
    const [selTense,setSelTense]=useState(null);
    const [selPerson,setSelPerson]=useState(null);
    const [selNumber,setSelNumber]=useState(null);
    const [transAns,setTransAns]=useState('');
    const [fb,setFb]=useState(null);
    const [busy,setBusy]=useState(false);
    const inRef=useRef();
    const selPN=(selPerson&&selNumber)?`${selPerson[0]}-${selNumber[0]}`:null;
    const q=qs[idx];
    useEffect(()=>{if(!fb)inRef.current?.focus()},[idx,fb]);
    const nx=()=>{setSelTense(null);setSelPerson(null);setSelNumber(null);setTransAns('');setFb(null);if(idx+1>=qs.length)onDone();else setIdx(i=>i+1)};
    const check=async()=>{
      if(!selTense||!selPerson||!selNumber||!transAns.trim()||busy)return;
      setBusy(true);
      const correctKey=`${q.tense}|${q.person}|${q.number}|${q.translation}`;
      const res=await post('/api/check',{pupil_id:pupil.id,set_id:set.id,question_type:'parse_translate',
        question_text:q.form,pupil_answer:transAns,correct_answer:correctKey,
        tense:selTense,person:selPerson,number:selNumber});
      setFb(res);
      if(res.counts_as_correct){addC();}
      else{addW({latin:q.form,correct:`${q.tense} ${q.person} ${q.number} — ${q.translation}`});}
      setBusy(false);
    };
    useEffect(()=>{const h=e=>{if(fb&&e.key==='Enter')nx();if(!fb&&e.key==='Enter'&&selTense&&selPerson&&selNumber&&transAns.trim())check();};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);});
    if(!q)return null;
    return(
      <div className="fullscreen"><div className="topbar"><h1>TRINITY ACADEMY LATIN</h1></div>
        <div className="activity anim-fade"><div className="activity-bar"><div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}></div></div></div>
        <div className="activity-body">
          <p style={{color:'var(--grey)',marginBottom:8,fontWeight:700,fontSize:'1.2rem'}}>Parse this verb and translate it into English:</p>
          <h1 className="latin dynamic-latin" style={{fontSize:'4rem',marginBottom:24}}>{q.form}</h1>
          <div style={{background:'var(--white)',borderRadius:20,padding:'32px 40px',maxWidth:860,width:'100%',boxShadow:'0 8px 24px rgba(0,0,0,.06)',marginBottom:24}}>
            <div style={{marginBottom:20}}>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Tense</p>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
                {TENSES.map(t=><button key={t} disabled={!!fb}
                  onClick={()=>setSelTense(t===selTense?null:t)}
                  style={{padding:'10px 20px',borderRadius:12,border:`2px solid ${t===selTense?'var(--navy)':'var(--lgrey)'}`,
                    background:t===selTense?'var(--navy)':'var(--white)',color:t===selTense?'var(--white)':'var(--dark)',
                    fontWeight:700,fontSize:'1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
                  {t}
                </button>)}
              </div>
            </div>
            <div style={{marginBottom:20}}>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Person / Number</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                {PERSON_NUMBERS.map(pn=>{
                  const isSelected=pn.p===selPerson&&pn.n===selNumber;
                  return <button key={pn.id} disabled={!!fb}
                    onClick={()=>{if(isSelected){setSelPerson(null);setSelNumber(null)}else{setSelPerson(pn.p);setSelNumber(pn.n)}}}
                    style={{padding:'14px 10px',borderRadius:12,border:`2px solid ${isSelected?'var(--navy)':'var(--lgrey)'}`,
                      background:isSelected?'var(--navy)':'var(--white)',color:isSelected?'var(--white)':'var(--dark)',
                      fontWeight:700,fontSize:'1rem',cursor:fb?'default':'pointer',transition:'all .15s'}}>
                    {pn.label}
                  </button>;
                })}
              </div>
            </div>
            <div>
              <p style={{fontWeight:800,color:'var(--grey)',fontSize:'0.85rem',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:8}}>Translation</p>
              <input ref={inRef} className={`typed-input ${fb?(fb.counts_as_correct?'ok':'bad'):''}`}
                value={transAns} onChange={e=>setTransAns(e.target.value)} disabled={!!fb}
                placeholder="Type the English translation..." style={{fontSize:'1.5rem',padding:'20px 28px'}}/>
            </div>
          </div>
          {fb&&<div className={`feedback anim-fade ${fb.counts_as_correct?'ok':'bad'}`} style={{maxWidth:860,marginBottom:16}}>{renderText(fb.message)}</div>}
          {!fb&&<button className="btn btn-primary" disabled={!selTense||!selPerson||!selNumber||!transAns.trim()||busy}
            onClick={check} style={{opacity:(!selTense||!selPerson||!selNumber||!transAns.trim())?0.4:1}}>
            Check<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          {fb&&<button className="btn btn-primary anim-fade" onClick={nx}>
            Next<span className="keyhint" style={{color:'white'}}>Enter</span>
          </button>}
          <p style={{marginTop:16,color:'var(--lgrey)',fontSize:'0.9rem',fontWeight:700}}>
            Question {idx+1} of {qs.length}
          </p>
        </div></div>
      </div>
    );
  }

  // ── Results ───────────────────────────────────────────────────────────────────
  function Results({res,set,total,onFinish,onSaveAndNext}){
    const score=total>0?Math.min(100,Math.round((res.correct/total)*100)):100;
    const passed=score>=(set.pass_mark||80);
    const [nextN,setNextN]=useState(null);
    useEffect(()=>{api('/api/sets').then(all=>{const idx=all.findIndex(x=>x.id===set.id);setNextN(idx>=0&&idx+1<all.length?all[idx+1]:null);})},[set.id]);
    useEffect(()=>{const h=e=>{if(e.key==='Escape')onFinish(score);if(e.key==='Enter'){if(passed&&nextN)onSaveAndNext(score,nextN);else onFinish(score)}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[score,passed,nextN]);
    return(
      <div className="fullscreen results anim-fade">
        <h1 style={{fontSize:'3rem',color:'var(--navy)',marginBottom:20}}>{passed?'Set Complete!':'Set Failed'}</h1>
        <div className={`big-score ${passed?'pass':'fail'}`}>{score}%</div>
        <p style={{fontSize:'1.5rem',fontWeight:800,color:'var(--navy)',marginTop:20,marginBottom:40}}>{grade(score)}</p>
        {res.wrong.length>0&&<div style={{textAlign:'left',background:'var(--white)',borderRadius:20,padding:'40px',margin:'30px 0',maxWidth:900,width:'100%',border:'4px solid var(--red-bright)'}}>
          <h3 style={{color:'var(--red-bright)',marginBottom:20,fontSize:'1.5rem'}}>Review these:</h3>
          {res.wrong.map((w,i)=><div key={i} style={{padding:'16px 0',borderBottom:'2px solid var(--lgrey)',fontSize:'1.3rem'}}><strong className={w.latin?'latin':''}>{w.latin||w.question}</strong> - <span style={{color:'#1a73e8',fontWeight:700}}>{w.correct}</span></div>)}
        </div>}
        <div style={{display:'flex',gap:24,marginTop:40}}>
          <button className="btn btn-outline" style={{fontSize:'1.4rem'}} onClick={()=>onFinish(score)}>Menu<span className="keyhint">Esc</span></button>
          {passed&&nextN&&<button className="btn btn-green" style={{fontSize:'1.4rem'}} onClick={()=>onSaveAndNext(score,nextN)}>Next Set<span className="keyhint" style={{color:'white'}}>Enter</span></button>}
        </div>
      </div>
    );
  }

  const root=ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
</script>
</body>
</html>
